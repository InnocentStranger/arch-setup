---
version: "3.8"

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    network_mode: host
    volumes:
      # This bind mount maps the local folder to the container.
      # It will survive 'down -v' entirely.
      - ./open-webui-data:/app/backend/data
