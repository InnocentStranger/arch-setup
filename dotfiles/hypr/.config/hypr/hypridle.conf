# ~/.config/hypr/hypridle.conf

general {
    # Command to run when you trigger a lock manually
    lock_cmd = pidof hyprlock || hyprlock       
    
    # Safety net: if something else tries to sleep the PC, lock it first
    before_sleep_cmd = loginctl lock-session    
    
    # Ensure display turns back on if the system wakes from a forced sleep
    after_sleep_cmd = hyprctl dispatch dpms on  
}

# ──────────────────────────────────────────────────────────
#  STAGE 1: LOCK THE SCREEN
# ──────────────────────────────────────────────────────────
listener {
    timeout = 600                                 # 10 minutes
    on-timeout = loginctl lock-session            # Trigger the lock screen
}

# ──────────────────────────────────────────────────────────
#  STAGE 2: TURN OFF MONITORS (DPMS)
# ──────────────────────────────────────────────────────────
listener {
    timeout = 630                                 # 10.5 minutes (30s after lock)
    on-timeout = hyprctl dispatch dpms off        # Tell GPU to cut video signal
    on-resume = hyprctl dispatch dpms on          # Waking up turns screens back on
}
