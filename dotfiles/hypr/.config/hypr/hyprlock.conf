# ╔══════════════════════════════════════════════════════════╗
# ║             hyprlock.conf — Professional Layout          ║
# ╚══════════════════════════════════════════════════════════╝

general {
    no_fade_in          = false
    no_fade_out         = false
    grace               = 0
    disable_loading_bar = true
    hide_cursor         = true
    ignore_empty_input  = true
}

# ──────────────────────────────────────────────────────────
#  BACKGROUND (Frosted Glass Effect)
# ──────────────────────────────────────────────────────────
background {
    monitor     =
    path        = $HOME/arch-setup/utils/wallpaper/astronaut.png
    
    # Modern lock screens usually employ a slight blur to separate the UI
    blur_passes = 2 
    blur_size   = 5
    brightness  = 0.75
    contrast    = 1.0
    vibrancy    = 0.1696
}

# ══════════════════════════════════════════════════════════
#  TOP — Clock
# ══════════════════════════════════════════════════════════
label {
    monitor     =
    text        = $TIME
    color       = rgba(255, 255, 255, 0.95)
    font_size   = 110
    font_family = JetBrainsMono Nerd Font ExtraBold

    shadow_passes = 2
    shadow_size   = 10
    shadow_color  = rgba(0, 0, 0, 0.50)

    position = 0, -80
    halign   = center
    valign   = top
}

# ══════════════════════════════════════════════════════════
#  TOP — Date
# ══════════════════════════════════════════════════════════
label {
    monitor     =
    text        = cmd[update:60000] date "+%A, %B %-d"
    color       = rgba(255, 255, 255, 0.65)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font Bold

    shadow_passes = 1
    shadow_size   = 6
    shadow_color  = rgba(0, 0, 0, 0.40)

    # Increased from -230 to -260 for more breathing room
    position = 0, -260
    halign   = center
    valign   = top
}

# ══════════════════════════════════════════════════════════
#  CENTER — Big Avatar
# ══════════════════════════════════════════════════════════
image {
    monitor      =
    path         = $HOME/arch-setup/utils/avatar/avatar.png
    size         = 220
    rounding     = -1
    border_size  = 4
    border_color = rgb(33ccff) 

    shadow_passes = 2
    shadow_size   = 15
    shadow_color  = rgba(0, 0, 0, 0.50)

    position = 0, 70
    halign   = center
    valign   = center
}

# ══════════════════════════════════════════════════════════
#  CENTER — Username
# ══════════════════════════════════════════════════════════
label {
    monitor     =
    text        = JohnWick
    color       = rgba(255, 255, 255, 0.85)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font Bold

    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(0, 0, 0, 0.50)

    # Placed dynamically below the 220px avatar
    position = 0, -75
    halign   = center
    valign   = center
}

# ══════════════════════════════════════════════════════════
#  BOTTOM — Password Input
# ══════════════════════════════════════════════════════════
input-field {
    monitor  =
    size     = 280, 50

    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.20
    dots_center       = true
    dots_rounding     = -1

    outer_color  = rgba(255, 255, 255, 0.0)
    inner_color  = rgba(0, 0, 0, 0.40)
    font_color   = rgba(255, 255, 255, 0.90)

    check_color    = rgb(33ccff)
    fail_color     = rgb(ff3333)
    capslock_color = rgb(ffcc00)

    rounding = -1

    placeholder_text = <i>password</i>
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition  = 300

    position = 0, 120
    halign   = center
    valign   = bottom
}

# ══════════════════════════════════════════════════════════
#  BOTTOM — Hint Label
# ══════════════════════════════════════════════════════════
label {
    monitor     =
    text        = SECURE SESSION
    color       = rgba(255, 255, 255, 0.25)
    font_size   = 10
    font_family = JetBrainsMono Nerd Font Bold

    position = 0, 80
    halign   = center
    valign   = bottom
}
