[Settings]
language = en
backend = awww
folder = ~/Pictures/Wallpaper
monitors = All
wallpaper = ~/Pictures/Wallpaper/default-wallpaper.jpg
fill = fill
sort = name
color = #ffffff
subfolders = True
all_subfolders = True
show_hidden = True
show_gifs_only = False
zen_mode = False
post_command = matugen --source-color-index 0 image $wallpaper
number_of_columns = 3
use_xdg_state = False
show_path_in_tooltip = True
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
stylesheet = /home/johnwick/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini
