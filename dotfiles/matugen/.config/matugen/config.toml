[config.wallpaper]
command = "awww img --transition-type wipe --transition-step 90 --transition-fps 60 {{ image }}"

# -- WAYBAR --
[templates.waybar]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar"

# -- HYPRLAND --
[templates.hyprland]
input_path = "~/.config/matugen/templates/colors.lua"
output_path = "~/.config/hypr/colors.lua"
post_hook = "hyprctl reload"

# -- KITTY TERMINAL --
[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/matugen-colors.conf"
post_hook = "killall -SIGUSR1 kitty"
